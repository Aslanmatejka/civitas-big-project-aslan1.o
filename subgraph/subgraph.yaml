      abis:
        - name: ZKVerifier
          file: ./abis/ZKVerifier.json
      eventHandlers:
        - event: ProofVerified(indexed address,indexed uint8,bool,uint256)
          handler: handleProofVerified
      file: ./src/mapping.ts
