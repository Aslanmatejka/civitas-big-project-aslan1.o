          handler: handleVestingClaimed
      file: ./src/mapping.ts

  # ── ZKVerifier ────────────────────────────────────────────────────────────────
  - kind: ethereum
    name: ZKVerifier
    network: mainnet
    source:
      address: "0xB7f8BC63BbcaD18155201308C8f3540b07f84F5e"
